{% extends 'base.html' %}

{% block title %}Set New Password{% endblock %}

{% block content %}
<!-- <div class="card"> -->
    <div class="row justify-content-center ">
    <div class="col-md-4">
        <div class="card shadow p-4">
<h2>Set New Password</h2>

<p>Username: <b>{{ username }}</b></p>

<form method="post">
    {% csrf_token %}
    <input type="password" name="new_password" placeholder="New Password" style="width: 300px;border-radius: 10px;"><br><br>

    <input type="password" name="confirm_password" placeholder="Confirm Password" style="width: 300px;border-radius: 10px;"><br><br>

    <button type="submit" style="width: 200px;border-radius: 10px;margin-left: 50px;"> Update Password</button>
</form>
</div>
</div>
</div>
{% endblock %}
