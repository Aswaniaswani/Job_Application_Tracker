{% extends "base.html" %}

{% block content %}
<div class="col-md-6 mx-auto card p-4 shadow">
    <h3 class="text-center mb-3">Register</h3>

    <form method="post">
        {% csrf_token %}

        <input class="form-control mb-2" name="username" placeholder="Username">
        <input class="form-control mb-2" name="email" type="email" placeholder="Email">
        <input class="form-control mb-2" name="password1" type="password" placeholder="Password">
        <input class="form-control mb-2" name="password2" type="password" placeholder="Confirm Password">

        <select class="form-control mb-3" name="role">
            <option value="">Select Role</option>
            <option value="recruiter">Recruiter</option>
            <option value="candidate">Candidate</option>
        </select>

        <button class="btn btn-primary w-100">Register</button>
    </form>

    <p class="text-center mt-3">
        Already registered? <a href="{% url 'login' %}">Login</a>
    </p>
</div>
{% endblock %}
